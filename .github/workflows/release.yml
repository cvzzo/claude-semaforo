name: Release

# Si attiva quando pushi un tag tipo v1.15.0 → build + release automatica.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        # Il package-lock punta a un registry privato interno (non raggiungibile
        # dai runner GitHub): lo ignoriamo e installiamo dal registry pubblico.
        run: |
          rm -f package-lock.json
          npm install --registry=https://registry.npmjs.org --no-audit --no-fund

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx @vscode/vsce package

      - name: Build complete zip
        run: |
          V="${GITHUB_REF_NAME#v}"
          mkdir -p stage
          cp "claude-semaforo-${V}.vsix" claude-state-hook.js claude-settings-example.json packaging/INSTALL.txt stage/
          (cd stage && zip -r "../claude-semaforo-${V}-complete.zip" .)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Claude Status ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            claude-semaforo-*.vsix
            claude-semaforo-*-complete.zip
